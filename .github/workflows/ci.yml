name: CI Pipeline with SonarQube (Production Mode)

on:
  push:
    branches: [ main ]

jobs:
  sonarqube:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://192.168.88.131:9000
      with:
        args: >
          -Dsonar.projectKey=CI-CD-Practice
          -Dsonar.sources=.

    - name: Wait for analysis and get Quality Gate
      run: |
        # Wait for SonarQube to process
        sleep 10

        # Get task ID from scanner report
        TASK_ID=$(cat .scannerwork/report-task.txt | grep ceTaskId | cut -d= -f2)
        echo "Task ID: $TASK_ID"

        # Check quality gate status
        for i in {1..30}; do
          STATUS=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "http://192.168.88.131:9000/api/ce/task?id=$TASK_ID" | jq -r .task.status)
          echo "Status: $STATUS"

          if [ "$STATUS" = "SUCCESS" ]; then
            QG_STATUS=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "http://192.168.88.131:9000/api/qualitygates/project_status?projectKey=CI-CD-Practice" | jq -r .projectStatus.status)
            echo "Quality Gate: $QG_STATUS"

            if [ "$QG_STATUS" != "OK" ]; then
              echo "❌ Quality Gate Failed: $QG_STATUS"
              exit 1
            else
              echo "✅ Quality Gate Passed"
              exit 0
            fi
          elif [ "$STATUS" = "FAILED" ]; then
            echo "❌ Analysis Failed"
            exit 1
          fi

          sleep 5
        done

        echo "❌ Timeout waiting for analysis"
        exit 1
