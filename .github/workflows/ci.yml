name: CI Pipeline with SonarQube (Self-hosted)

on:
  push:
    branches: [ main ]

jobs:
  sonarqube:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://192.168.88.131:9000
      with:
        args: >
          -Dsonar.projectKey=ci-cd-practice
          -Dsonar.sources=.
