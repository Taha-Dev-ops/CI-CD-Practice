name: CI Pipeline with SonarQube (Production Mode)

on:
  push:
    branches: [ main ]

jobs:
  sonarqube:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug - System Info
      run: |
        echo "=== PATH ==="
        echo $PATH
        echo "=== jq location ==="
        which jq
        echo "=== jq version ==="
        jq --version
        echo "=== Current user ==="
        whoami
        echo "=== Home dir ==="
        ls -la ~/

    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: http://192.168.88.131:9000
      with:
        args: >
          -Dsonar.projectKey=CI-CD-Practice
          -Dsonar.sources=.

    - name: Quality Gate Check
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
